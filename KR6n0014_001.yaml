body:
  text: 大慈恩寺沙門基撰劫名次第及數量成住壞空并始終餘三無定不可準故約住劫論多少先所有情生瞻部成劫終滿住劫初爾時人壽命無量至十歲時減劫終及後百年減一年八萬四千為最上從彼子年倍父增還登八萬四千歲一增一減為一劫數滿二十住劫終即此住時稱賢劫二十數中第九劫六萬四萬二萬時拘留那含迦葉興百歲釋迦牟尼出人壽三十萬飢饉七年七月七日滿聚骨運籌多滅亡二十歲時疾病侵七月七日災方畢至十歲時刀兵起七日七夜相殺傷餘少人民不盡滅怖災造福增延命子年倍父增八萬從彼減劫慈氏興至第十五減劫中九百九十四佛出乃後住劫欲終時樓志如來方出興住中最後唯增劫人多厭世樂修定無間有情既不生壞劫爾時初禪起地獄鬼畜三惡盡拘盧勝身牛貨洲瞻部四王忉利空六欲諸天次第捨始從無間終他化時經十九增減同下界既空無有情日加四倍於常熱溝池乾涸草木燋二三日出江河竭四五日現海泉盡六七興時山石融爾時大地并炎暉三千世界猛火聚聳炎上騰交梵世諸天奔去趣二禪梵輔梵王次第昇世界三千并灰燼從地火起梵王去後經一箇增減時十九從多稱壞情一劫約少唯論器從是虛空如黑穴還同二十增減劫過此空時成劫興大梵天王最初建獨住時經一增減從念臣人輔眾生欲界四空情器俱從上次第皆成立下際微風方漸發天仙唱號劫初成如是展轉大風起堅若金剛不可壞傍廣算數計不及邊際由如盤鉉形深厚十六洛叉數此下風輪世界底光音天下金藏雲遍覆風輪大千界鳴雨滴瀝如車軸注水滂淋滿界中下八洛又餘水凝金剛厚三億二萬廣闊四倍多增量十二三千四百半皆踰繕那量應知水輪寬量亦如是復注雨水增深廣空居次第從上成大風鼓擊成山地玅高七金清水成諸餘山地濕濁成七山內水悉甘美四洲外海水鹹滷山地麤妙有差殊器界爾時成立訖二禪福盡生瞻部身長千尺二千尺光明晈潔能飛騰所食地肥地味餅香味具足資諸天後漸生貪競多取地餅失沒林藤出後競林藤粳米出貯積復失香稻生食漸麤蠲成便利男女爾時差別形由躭染情身光滅世界黑暗失光明菩薩慈悲興日月競取香稻貪地利於是竊盜乃初行共立田主設疆隅即知界畔均分布田主憍慢陵諸弱致有軍形相罰生殺妄婬綺語增多十惡以資皆具足死墮鬼畜并無間既覩惡趣善不生北東西貨等三洲四王忉利及空居修因漸漸得生彼爾時成劫乃為終始從梵王終忉利有情及器皆成立成壞空三等住劫還同二十增減時無間有情一增減龍王受報亦同然梵眾二十增減劫梵輔四十增減攝梵王六十增減劫先生後捨故應知日月歲時小劫収增減二四六中攝八十方名大劫時水火風災漸次行七火災後一水災七火中間有七水初二靜慮焚漂訖風災能壞第三禪第四靜慮無能壞火水風災以為數數不能及僧祗量即此大劫三無數菩薩將登正覺時
